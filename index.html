<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Solver</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="app-shell">
        <header class="header">
            <h1>Sudoku Solver</h1>
            <p>Enter numbers, watch conflicts light up, and solve the grid.</p>
        </header>

        <div class="controls">
            <button id="resetBtn" type="button">Reset</button>
            <button id="newGameBtn" type="button">New Game</button>
        </div>

        <div class="container">
            <div class="board" aria-label="Sudoku board">
                <!-- input -->
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
